</head>
<body>

<nav>
  <div class="logo">SAFWAN HANIF<span>_</span></div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="projects.html" class="active">Projects</a></li>
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
  <button id="theme-toggle" aria-label="Toggle theme">☾</button>
</nav>

<section style="padding-top:60px;">
  <div class="section-head">
    <div class="eyebrow">// All Work</div>
    <h2>Projects</h2>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="uiux">UI/UX</button>
    <button class="filter-btn" data-filter="genai">GenAI</button>
  </div>

  <div class="project-grid" id="project-grid"></div>
</section>

<footer>
  <div class="social">
    <a href="https://github.com/SafwanHanif" target="_blank">GitHub</a>
    <a href="https://www.linkedin.com/in/safwan-hanif-e5m/" target="_blank">LinkedIn</a>
    <a href="mailto:safwanxd6@gmail.com">Email</a>
  </div>
  &copy; 2026 Safwan Hanif. Built pixel by pixel.
</footer>

<button id="ai-toggle" aria-label="Open AI assistant">&gt;_</button>
<div id="ai-panel">
  <div class="term" style="border:none;flex:1;display:flex;flex-direction:column;">
    <div class="title-bar">
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="label">ask_safwan_hanif_ai.exe</div>
    </div>
    <div id="ai-log">
      <div class="msg bot">&gt; Hi, I'm Safwan Hanif's AI assistant. Ask me about his projects, skills, or how to get in touch.</div>
    </div>
    <div id="ai-input-row">
      <input id="ai-input" type="text" placeholder="Ask me something...">
      <button id="ai-send">&gt;</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  const grid = document.getElementById("project-grid");

  function render(filter) {
    const list = filter === "all" ? PROJECTS : PROJECTS.filter(p => p.category === filter);
    grid.innerHTML = list.map(p => `
      <div class="project-card">
        <div class="body">
          <span class="tag ${p.category}">${p.tagLabel}</span>
          <h3>${p.title}</h3>
          <p>${p.summary}</p>
          <div class="links">
            <a href="project.html?id=${p.id}">View Details</a>
            <a href="${p.github}">GitHub</a>
          </div>
        </div>
      </div>
    `).join("");
  }
  render("all");

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render(btn.dataset.filter);
    });
  });
</script>
</body>
</html>
