  </ul>

</nav>

<div class="detail-hero">
  <div class="eyebrow" id="d-tag">// Project</div>
  <h1 id="d-title" style="font-size:28px;margin-top:14px;">Loading...</h1>
  <p id="d-summary" style="margin-top:14px;color:var(--muted);font-size:14px;"></p>
  <div class="stack-pills" id="d-stack"></div>
  <div style="margin-top:24px;display:flex;gap:14px;">
    <a id="d-github" href="#" class="btn">GitHub</a>
    <a id="d-demo" href="#" class="btn alt">Live Demo</a>
  </div>
</div>

<section id="d-body"></section>

<footer>
  <div class="social">
    <a href="https://github.com/SafwanHanif" target="_blank">GitHub</a>

<button id="ai-toggle" aria-label="Open AI assistant">&gt;_</button>
<div id="ai-panel">
  <div class="term" style="border:none;flex:1;display:flex;flex-direction:column;">
    <div class="title-bar">
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="label">ask_safwan_hanif_ai.exe</div>
    </div>
    <div id="ai-log">
      <div class="msg bot">&gt; Hi, I'm Safwan Hanif's AI assistant. Ask me about his projects, skills, or how to get in touch.</div>
    </div>
    <div id="ai-input-row">
      <input id="ai-input" type="text" placeholder="Ask me something...">
      <button id="ai-send">&gt;</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  const project = PROJECTS.find(p => p.id === id) || PROJECTS[0];

  document.getElementById("d-tag").textContent = "// " + project.tagLabel + " Project";
  document.getElementById("d-title").textContent = project.title;
  document.getElementById("d-summary").textContent = project.summary;
  document.getElementById("d-github").href = project.github;
  document.getElementById("d-demo").href = project.demo;
  if (project.github === "#") document.getElementById("d-github").style.display = "none";
  if (project.demo === "#") document.getElementById("d-demo").style.display = "none";
  document.getElementById("d-stack").innerHTML = project.stack.map(s => `<span>${s}</span>`).join("");

  function galleryHTML(images) {
    if (!images || images.length === 0) return "";
    return `
      <div class="detail-section">
        <h3>Gallery</h3>
        <div class="gallery">
          ${images.map(src => `<img src="${src}" alt="" loading="lazy">`).join("")}
        </div>
      </div>
    `;
  }

  function figmaHTML(embed) {
    if (!embed) return "";
    return `
      <div class="detail-section">
        <h3>Interactive Prototype</h3>
        <div class="figma-embed-wrap">
          <iframe src="${embed}" allowfullscreen></iframe>
        </div>
      </div>
    `;
  }

  function renderDiagram(diagram) {
    if (!diagram) return "";
    const chains = diagram.split("|");
    let html = '<div class="pipeline">';
    chains.forEach(function(chain, ci) {
      var parts = chain.split(" --> ");
      parts.forEach(function(part, j) {
        if (j > 0) html += '<span class="pipe-arrow"> --> </span>';
        html += '<span class="pipe-node">' + part.trim() + '</span>';
      });
      if (ci < chains.length - 1) html += '<br>';
    });
    html += '</div>';
    return html;
  }

  const body = document.getElementById("d-body");
  if (project.category === "uiux") {
    body.innerHTML = `
      <div class="detail-section">
        <h3>Problem</h3>
        <p>${project.problem}</p>
      </div>
      <div class="detail-section">
        <h3>Research</h3>
        <p>${project.research}</p>
      </div>
      <div class="detail-section">
        <h3>Key Features</h3>
        <ul class="feature-list">${(project.features || []).map(f => `<li>${f}</li>`).join("")}</ul>
      </div>
      ${galleryHTML(project.images)}
      ${figmaHTML(project.figmaEmbed)}
    `;
  } else {
    body.innerHTML = `
      <div class="detail-section">
        <h3>Problem</h3>
        <p>${project.problem}</p>
      </div>
      <div class="detail-section">
        <h3>Architecture</h3>
        <p>${project.architecture}</p>
        ${renderDiagram(project.diagram)}
      </div>
      <div class="detail-section">
        <h3>Key Features</h3>
        <ul class="feature-list">${(project.features || []).map(f => `<li>${f}</li>`).join("")}</ul>
      </div>
      ${galleryHTML(project.images)}
      ${figmaHTML(project.figmaEmbed)}
    `;
  }
</script>
</body>
</html>
